{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-9">
        <div class="glass-card p-5 border-0">
            <div class="d-flex flex-wrap justify-content-between align-items-center mb-5 gap-3">
                <h2 class="fw-bold m-0"><span class="text-gradient">編輯食譜</span></h2>
                <form action="{{ url_for('recipe.delete', id=recipe.id) }}" method="POST" onsubmit="return confirm('確定要刪除這份食譜嗎？此操作將無法復原。');" class="m-0">
                    <button type="submit" class="btn btn-outline-danger rounded-pill px-4">刪除此食譜</button>
                </form>
            </div>
            
            <form action="{{ url_for('recipe.update', id=recipe.id) }}" method="POST">
                <div class="mb-4">
                    <label for="title" class="form-label fs-5">食譜名稱 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control form-control-lg border-0 py-3" id="title" name="title" value="{{ recipe.title }}" required>
                </div>
                <div class="mb-4">
                    <label for="description" class="form-label fs-5">簡短描述</label>
                    <textarea class="form-control border-0 py-3" id="description" name="description" rows="2">{{ recipe.description }}</textarea>
                </div>
                
                <div class="row mb-4">
                    <div class="col-md-6 mb-4 mb-md-0">
                        <label for="ingredients" class="form-label fs-5">所需食材 <small class="text-muted fw-normal fs-6">(以逗號分隔)</small></label>
                        <textarea class="form-control border-0 py-3" id="ingredients" name="ingredients" rows="3">{{ ingredients_str }}</textarea>
                    </div>
                    <div class="col-md-6">
                        <label for="tags" class="form-label fs-5">標籤分類 <small class="text-muted fw-normal fs-6">(以逗號分隔)</small></label>
                        <textarea class="form-control border-0 py-3" id="tags" name="tags" rows="3">{{ tags_str }}</textarea>
                    </div>
                </div>

                <div class="mb-5">
                    <label for="instructions" class="form-label fs-5">詳細步驟</label>
                    <textarea class="form-control border-0 py-3" id="instructions" name="instructions" rows="8">{{ recipe.instructions }}</textarea>
                </div>
                
                <div class="d-flex justify-content-end gap-3 mt-5">
                    <a href="{{ url_for('recipe.show', id=recipe.id) }}" class="btn btn-outline-glass px-5 py-3 rounded-pill fw-bold">取消</a>
                    <button type="submit" class="btn btn-gradient px-5 py-3 rounded-pill fs-5">儲存所有變更</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
